<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Offener Betrag</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 80px;
}

.card {
    display: inline-block;
    padding: 20px;
    border: 1px solid #ccc;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input {
    padding: 10px;
    width: 200px;
    margin: 5px;
}

button {
    padding: 10px 20px;
    cursor: pointer;
}

.amount {
    font-size: 30px;
    color: red;
    margin-top: 10px;
}
</style>
</head>

<body>

<h2>💰 Offener Betrag</h2>

<div id="login">
    <input type="text" id="user" placeholder="Name">
    <br>
    <input type="password" id="code" placeholder="Code">
    <br>
    <button onclick="login()">Anzeigen</button>
</div>

<div id="app"></div>

<script>

// 🔗 Google Sheets CSV (Übersicht Tab)
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1AmXLFBc-G9i_N6cyrKb8fPvF-CMLf6hXjdq83uG55FY/export?format=csv&gid=0";

// 🔐 erlaubte Nutzer
const users = {
    "Sam": "SamT19",
    "Rosi": "RosiG29",
    "Julian": "JulianZ79",
    "Polina": "PolinaH73"
};

function login() {
    const user = document.getElementById("user").value.trim();
    const code = document.getElementById("code").value.trim();

    if (!users[user] || users[user] !== code) {
        alert("❌ Falscher Name oder Code");
        return;
    }

    loadData(user);
}

function loadData(user) {
    fetch(SHEET_URL)
        .then(res => res.text())
        .then(data => {

            const rows = data
                .trim()
                .split("\n")
                .map(r => r.split(","));

            let found = false;

            // ab Zeile 3 im Sheet → Index 2
            for (let i = 2; i < rows.length; i++) {
                const name = rows[i][0];
                const amount = rows[i][1];

                if (name === user) {
                    document.getElementById("login").style.display = "none";

                    document.getElementById("app").innerHTML = `
                        <div class="card">
                            <h3>${name}</h3>
                            <div class="amount">${amount} €</div>
                        </div>
                    `;

                    found = true;
                    break;
                }
            }

            if (!found) {
                alert("❌ Kein Eintrag im Sheet gefunden");
            }
        })
        .catch(err => {
            console.error(err);
            alert("Fehler beim Laden der Tabelle");
        });
}
</script>

</body>
</html>
