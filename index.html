<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<title>Mein Betrag</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 50px;
}

.card {
    display: inline-block;
    padding: 20px;
    border: 1px solid #ccc;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.amount {
    font-size: 30px;
    color: red;
}
</style>

</head>

<body>

<h2>💰 Dein offener Betrag</h2>

<div id="app"></div>

<script>
// 🔗 Google Sheets CSV Link einsetzen
const SHEET_URL = "https://docs.google.com/spreadsheets/d/DEINE_ID/export?format=csv&gid=1730278130";

// 🔐 Benutzer + Codes
const users = {
    "Sam": "SamT19",
    "Rosi": "RosiG29",
"Julian": "JulianZ79",
"Polina": "PolinaH73"
};

const params = new URLSearchParams(window.location.search);
const user = params.get("user");
const code = params.get("code");

if (!user || !code || users[user] !== code) {
    document.body.innerHTML = "<h3>❌ Kein Zugriff</h3>";
} else {
    loadData(user);
}

function loadData(user) {
    fetch(SHEET_URL)
        .then(res => res.text())
        .then(data => {
            const rows = data.trim().split("\n").map(r => r.split(","));

            let found = false;

            rows.forEach((row, i) => {
                if (i > 0 && row[0] === user) {
                    document.getElementById("app").innerHTML = `
                        <div class="card">
                            <h3>${row[0]}</h3>
                            <div class="amount">${row[1]} €</div>
                        </div>
                    `;
                    found = true;
                }
            });

            if (!found) {
                document.getElementById("app").innerHTML = "Kein Eintrag gefunden";
            }
        });
}
</script>

</body>
</html>
