<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Betrag Login</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 80px;
}

.card {
    display: inline-block;
    padding: 20px;
    border: 1px solid #ccc;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input {
    padding: 10px;
    width: 200px;
    margin: 5px;
}

button {
    padding: 10px 20px;
    cursor: pointer;
}

.amount {
    font-size: 30px;
    color: red;
}
</style>
</head>

<body>

<h2>💰 Offener Betrag</h2>

<div id="login">
    <input type="text" id="user" placeholder="Name eingeben">
    <br>
    <button onclick="loadData()">Anzeigen</button>
</div>

<div id="app"></div>

<script>

// 🔗 Google Sheets CSV (HIER EINSETZEN)
const SHEET_URL = "https://docs.google.com/spreadsheets/d/DEINE_ID/export?format=csv&gid=0";

function loadData() {
    const user = document.getElementById("user").value.trim();

    if (!user) {
        alert("Bitte Namen eingeben");
        return;
    }

    fetch(SHEET_URL)
        .then(res => res.text())
        .then(data => {
            const rows = data.trim().split("\n").map(r => r.split(","));

            let found = false;

            for (let i = 1; i < rows.length; i++) {
                const name = rows[i][0];
                const amount = rows[i][1];

                if (name === user) {
                    document.getElementById("login").style.display = "none";

                    document.getElementById("app").innerHTML = `
                        <div class="card">
                            <h3>${name}</h3>
                            <div class="amount">${amount} €</div>
                        </div>
                    `;
                    found = true;
                    break;
                }
            }

            if (!found) {
                alert("❌ Name nicht gefunden");
            }
        })
        .catch(err => {
            console.error(err);
            alert("Fehler beim Laden der Daten");
        });
}
</script>

</body>
</html>
